name: Build and Release Script

on:
  push:
    branches: [ "master", "main" ]

jobs:
  release:
    runs-on: ubuntu-latest
    # This is CRITICAL for the "Release" to actually appear
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Removed libutil-dev to fix the error
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config gettext

      - name: Compile Script Utility
        run: |
          ./autogen.sh
          ./configure
          # Only build the 'script' binary
          make script
          
          mkdir -p release_assets
          cp script release_assets/script-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/script-linux-amd64
          tag_name: latest-build
          name: Latest Compiled Script
          body: "Auto-generated build of term-utils/script.c from util-linux"
          allow_updates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
