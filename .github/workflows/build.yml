name: Targeted column Build
on: [push, workflow_dispatch]
jobs:
  build_column:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libsmartcols-dev

      - name: Build column directly
        run: |
          gcc -O2 -o column \
            text-utils/column.c \
            -I./include \
            -lsmartcols

      - name: Verify Binary
        run: |
          ls -lh column
          file column
          ./column --version

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: column-compiled-binary
          path: column
