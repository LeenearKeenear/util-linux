name: Targeted uuidd Build
on: [push, workflow_dispatch]

jobs:
  build_uuidd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install All Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            gettext autopoint bison flex uuid-dev \
            libncurses5-dev libsystemd-dev libudev-dev libblkid-dev

      - name: Generate Build System
        run: |
          export ACLOCAL_PATH=/usr/share/aclocal
          ./autogen.sh

      - name: Configure for uuidd Only
        run: |
          ./configure --disable-all-programs \
                      --enable-uuidd \
                      --enable-libuuid \
                      --prefix=/usr

      - name: Compile uuidd
        run: make uuidd

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uuidd-compiled-binary
          path: uuidd
