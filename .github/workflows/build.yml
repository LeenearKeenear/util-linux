name: Targeted dmesg Build
on: [push, workflow_dispatch]

jobs:
  build_dmesg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install All Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            gettext \
            bison \
            flex \
            libncurses5-dev \
            libsystemd-dev \
            libudev-dev \
            libblkid-dev \
            asciidoctor

      - name: Generate Build System
        run: ./autogen.sh

      - name: Configure for dmesg Only
        # We disable everything else to make the build nearly instant
        run: |
          ./configure --disable-all-programs \
                      --enable-dmesg \
                      --prefix=/usr

      - name: Compile dmesg
        run: make dmesg

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmesg-compiled-binary
          # The binary is created in the root directory after 'make dmesg'
          path: dmesg
