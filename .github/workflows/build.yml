name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags starting with v (e.g., v2.40)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config \
                                 gettext libncursesw5-dev libtinfo-dev libmount-dev \
                                 libblkid-dev libuuid1 uuid-dev

      - name: Configure and Build
        run: |
          ./autogen.sh
          ./configure
          make -j$(nproc)

      - name: Bundle Binaries
        run: |
          mkdir release_binaries
          # This copies the major tools; adjust paths as needed
          cp fdisk mount umount lsblk blkid release_binaries/
          tar -czvf util-linux-bins.tar.gz release_binaries/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: util-linux-bins.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
