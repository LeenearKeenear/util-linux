name: Build column

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            autoconf \
            automake \
            autopoint \
            libtool \
            pkg-config \
            gettext \
            libncurses-dev \
            libslang2-dev \
            bison \
            flex

      - name: Clone util-linux
        run: |
          git clone --depth=1 https://github.com/util-linux/util-linux.git

      - name: Bootstrap
        working-directory: util-linux
        run: ./autogen.sh

      - name: Configure (minimal — only what column needs)
        working-directory: util-linux
        run: |
          ./configure \
            --disable-all-programs \
            --enable-column \
            --enable-libsmartcols \
            --without-python \
            --without-systemd \
            --without-udev \
            --disable-bash-completion

      - name: Build
        working-directory: util-linux
        run: make -j"$(nproc)" text-utils/column

      - name: Verify binary
        run: |
          file util-linux/text-utils/column
          util-linux/text-utils/column --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: column-binary
          path: util-linux/text-utils/column
