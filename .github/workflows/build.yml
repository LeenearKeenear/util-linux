name: Build column.c

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncursesw5-dev \
          libsystemd-dev \
          pkg-config

    - name: Build column directly
      run: |
        gcc -o column \
          -I. -Iinclude \
          text-utils/column.c \
          -lncursesw -lm \
          $(pkg-config --cflags --libs libsmartcols) \
          $(pkg-config --cflags --libs ncursesw) \
          -DHAVE_WIDECHAR

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: column-binary
        path: column
        retention-days: 30

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: column
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
