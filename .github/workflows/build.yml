name: Build and Release Script

on:
  push:
    branches: [ "master", "main" ] # Triggers immediately when you save

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libutil-dev autoconf automake libtool pkg-config

      - name: Compile Script Utility
        run: |
          ./autogen.sh
          ./configure
          make script
          mkdir -p release_assets
          cp script release_assets/script-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/script-linux-amd64
          tag_name: latest-build
          name: Latest Compiled Script
          body: "Auto-generated build of term-utils/script.c"
          allow_updates: true # Overwrites the same release each time
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
