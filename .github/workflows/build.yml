name: Targeted column Build
on: [push, workflow_dispatch]
jobs:
  build_column:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libsmartcols-dev \
            pkg-config

      - name: Patch Headers
        run: |
          # Fix reallocarray conflict - system already has it
          sed -i 's/static inline void \*reallocarray/\/\/ static inline void *reallocarray_disabled/' include/c.h
          sed -i 's/^static inline void \*reallocarray/\/\//' include/c.h

          # Fix fsync conflict
          sed -i '/static.*fsync/,/^}/s/^/\/\//' include/closestream.h

          # Fix usleep - define HAVE_USLEEP so the #error branch is skipped
          sed -i 's/#error "System with usleep() or nanosleep() required!"/#define HAVE_USLEEP 1/' include/c.h

          # Point libsmartcols.h to system install
          cp $(pkg-config --variable=includedir smartcols)/libsmartcols.h include/libsmartcols.h

      - name: Build column directly
        run: |
          gcc -O2 -o column \
            text-utils/column.c \
            -I./include \
            -I./libsmartcols \
            -D_GNU_SOURCE \
            -DHAVE_USLEEP \
            -DHAVE_NANOSLEEP \
            -Wno-error \
            $(pkg-config --libs smartcols)

      - name: Verify Binary
        run: |
          ls -lh column
          file column
          ./column --version

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: column-compiled-binary
          path: column
