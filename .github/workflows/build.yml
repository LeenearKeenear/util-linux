name: Nuclear Build Script

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Every Possible Dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            gettext \
            autopoint \
            bison \
            flex \
            libncursesw5-dev \
            libtinfo-dev \
            libmount-dev \
            libblkid-dev \
            uuid-dev \
            libfdisk-dev \
            libsmartcols-dev \
            libutil-dev

      - name: Force Build Script
        run: |
          ./autogen.sh
          # Standard configuration
          ./configure --disable-all-programs --enable-script --enable-static-programs
          
          # Build the script tool
          make script
          
          # Verify the file exists and move it
          mkdir -p release_assets
          if [ -f ./script ]; then
            cp script release_assets/script-linux-amd64
          else
            echo "Searching for script binary..."
            find . -name "script" -type f -executable -exec cp {} release_assets/script-linux-amd64 \;
          fi

      - name: Nuclear Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/script-linux-amd64
          tag_name: latest-build
          name: Latest Compiled Script
          body: "Direct binary build of term-utils/script.c"
          allow_updates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
