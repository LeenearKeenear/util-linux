name: Build column.c

on:
  push:
    branches: [ main, master ]
    paths:
      - 'text-utils/column.c'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libncursesw5-dev \
          libsystemd-dev

    - name: Configure and build util-linux
      run: |
        ./configure --disable-all-programs --enable-column
        make -j$(nproc)

    - name: Create artifacts directory
      run: mkdir -p artifacts

    - name: Copy compiled binary
      run: |
        if [ -f text-utils/column ]; then
          cp text-utils/column artifacts/column
        else
          # Fallback: check other possible locations
          find . -name "column" -type f -executable | head -1 | xargs -I {} cp {} artifacts/column || true
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: column-binary
        path: artifacts/column
        retention-days: 30

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/column
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
