name: Targeted column Build
on: [push, workflow_dispatch]
jobs:
  build_column:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install All Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            gettext \
            autopoint \
            bison \
            flex \
            libncurses5-dev \
            libsystemd-dev \
            libudev-dev \
            libblkid-dev \
            libpam0g-dev \
            libcap-ng-dev \
            libselinux1-dev \
            libaudit-dev \
            libmagic-dev \
            libuser1-dev \
            libsqlite3-dev \
            libcryptsetup-dev \
            libslang2-dev

      - name: Generate Build System
        run: |
          export ACLOCAL_PATH=/usr/share/aclocal
          ./autogen.sh

      - name: Configure Everything
        run: |
          ./configure --prefix=/usr

      - name: Build Everything
        run: make -j$(nproc)

      - name: Verify Binary
        run: |
          ls -lh column
          file column
          ./column --version

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: column-compiled-binary
          path: column
