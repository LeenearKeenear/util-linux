name: Build column.c

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install all build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          autoconf \
          automake \
          autopoint \
          libtool \
          pkg-config \
          gettext \
          gtk-doc-tools \
          libncursesw5-dev \
          libsystemd-dev \
          libcap-ng-dev \
          libpam-dev

    - name: Bootstrap and build
      run: |
        autoreconf -fiv
        ./configure --prefix=/tmp/install --disable-all-programs --enable-column
        make
        make install

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: column-binary
        path: /tmp/install/bin/column
        retention-days: 30

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: /tmp/install/bin/column
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
