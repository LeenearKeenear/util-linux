name: Targeted dmesg Build
on: [push, workflow_dispatch]

jobs:
  build_dmesg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install All Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            gettext \
            autopoint \
            bison \
            flex \
            libncurses5-dev \
            libsystemd-dev \
            libudev-dev \
            libblkid-dev

      - name: Verify Dependencies
        run: |
          which autopoint
          autopoint --version

      - name: Generate Build System
        run: |
          # Sometimes autogen.sh needs a little help finding its own macros
          export ACLOCAL_PATH=/usr/share/aclocal
          ./autogen.sh

      - name: Configure for dmesg Only
        run: |
          ./configure --disable-all-programs \
                      --enable-dmesg \
                      --prefix=/usr

      - name: Compile dmesg
        run: make dmesg

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmesg-compiled-binary
          path: dmesg
