name: Build util-linux

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          autoconf \
          automake \
          autopoint \
          libtool \
          pkg-config \
          gettext \
          gtk-doc-tools \
          libncursesw5-dev \
          libsystemd-dev \
          libsmartcols-dev \
          libcap-ng-dev \
          libpam-dev \
          libselinux1-dev \
          libutil-linux-dev

    - name: Bootstrap
      run: autoreconf -fiv

    - name: Configure
      run: ./configure --prefix=/tmp/install

    - name: Build
      run: make -j$(nproc)

    - name: Install
      run: make install

    - name: Create tarball
      run: tar -czf util-linux-build.tar.gz -C /tmp/install .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: util-linux-build
        path: util-linux-build.tar.gz
        retention-days: 30

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: util-linux-build.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
